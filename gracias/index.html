<style>
  :root {
    --black: #0a0a0a;
    --black2: #111111;
    --green: #00ff88;
    --white: #f5f5f5;
    --gray: #888888;
    --gray2: #333333;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Background grid */
  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }
  .bg-glow {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,255,136,0.07) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  /* Card */
  .card {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 64px 56px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 28px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    max-width: 480px;
    width: calc(100% - 48px);
    animation: card-in 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Check icon */
  .check-wrap {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(0,255,136,0.1);
    border: 2px solid rgba(0,255,136,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 32px;
    animation: pop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
  }

  @keyframes pop-in {
    from { opacity: 0; transform: scale(0.4); }
    to   { opacity: 1; transform: scale(1); }
  }

  .check-wrap svg {
    width: 38px;
    height: 38px;
    stroke: var(--green);
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    filter: drop-shadow(0 0 8px rgba(0,255,136,0.6));
  }

  .check-wrap svg .check-path {
    stroke-dasharray: 50;
    stroke-dashoffset: 50;
    animation: draw-check 0.4s ease 0.8s forwards;
  }

  @keyframes draw-check {
    to { stroke-dashoffset: 0; }
  }

  /* Pulse ring */
  .check-wrap::after {
    content: '';
    position: absolute;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2px solid rgba(0,255,136,0.25);
    animation: ring-pulse 2s ease-out 1.2s infinite;
  }

  @keyframes ring-pulse {
    0%   { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.7); opacity: 0; }
  }

  /* Text */
  .tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--green);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 1.1;
    margin-bottom: 16px;
    animation: fade-up 0.5s ease 0.5s both;
  }

  p {
    font-size: 16px;
    color: var(--gray);
    line-height: 1.6;
    max-width: 320px;
    margin: 0 auto 36px;
    animation: fade-up 0.5s ease 0.6s both;
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Button */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--green);
    color: #000;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 14px 28px;
    border-radius: 100px;
    text-decoration: none;
    transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
    animation: fade-up 0.5s ease 0.7s both;
  }

  .btn:hover {
    transform: translateY(-2px);
    background: #00ee7a;
    box-shadow: 0 8px 24px rgba(0,255,136,0.3);
  }

  /* Nav logo */
  .nav-logo {
    position: fixed;
    top: 24px;
    left: 40px;
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    z-index: 10;
  }
  .nav-logo-icon {
    width: 34px;
    height: 34px;
    background: var(--green);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: #000;
  }
  .nav-logo-text {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--white);
  }
  .nav-logo-text span { color: var(--green); }

  @media (max-width: 480px) {
    .card { padding: 48px 28px; }
    .nav-logo { left: 20px; }
  }
</style>
</head>
